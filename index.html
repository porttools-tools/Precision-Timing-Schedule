<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Turnaround Calculator</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="apple-touch-icon" sizes="57x57" href="icons/apple-icon-57x57.png">
  <link rel="apple-touch-icon" sizes="60x60" href="icons/apple-icon-60x60.png">
  <link rel="apple-touch-icon" sizes="72x72" href="icons/apple-icon-72x72.png">
  <link rel="apple-touch-icon" sizes="76x76" href="icons/apple-icon-76x76.png">
  <link rel="apple-touch-icon" sizes="114x114" href="icons/apple-icon-114x114.png">
  <link rel="apple-touch-icon" sizes="120x120" href="icons/apple-icon-120x120.png">
  <link rel="apple-touch-icon" sizes="144x144" href="icons/apple-icon-144x144.png">
  <link rel="apple-touch-icon" sizes="152x152" href="icons/apple-icon-152x152.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-icon-180x180.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/android-icon-192x192.png">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="96x96" href="icons/favicon-96x96.png">
  <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16x16.png">
  <link rel="manifest" href="manifest.json">
  <meta name="msapplication-TileColor" content="#ffffff">
  <meta name="msapplication-TileImage" content="icons/ms-icon-144x144.png">
  <meta name="theme-color" content="#ffffff">
</head>
<body class="on-landing">
  <header class="app-bar">
    <button type="button" class="btn-filter hidden" id="filterBtn" title="Toggle favorites filter">All</button>
    <button type="button" class="btn-back hidden" id="backToSchedulesBtn">Back</button>
    <div class="app-bar-title-wrap">
      <h1 class="app-bar-title">Precision Timing Schedule</h1>
    </div>
    <span class="app-bar-pill hidden" id="scheduleName"></span>
    <button type="button" class="btn-admin" id="adminBtn">Admin</button>
  </header>

  <main>
    <section id="landingScreen" class="screen">
      <div id="scheduleList" class="schedule-list"></div>
      <div class="actions">
        <button type="button" class="btn-new-schedule" id="newScheduleBtn">+ New schedule</button>
      </div>
    </section>

    <section id="mainScreen" class="screen hidden">
      <p class="hint">Enter any time (HHMM or HH:MM), then press Enter to calculate.</p>
      <div id="phaseList" class="phase-list"></div>
      <div class="actions">
        <button type="button" class="btn-edit" id="editScheduleBtn">Edit Schedule</button>
      </div>
    </section>

    <section id="editScreen" class="screen hidden">
      <div id="editList" class="phase-list"></div>
      <div class="actions actions-row">
        <button type="button" class="btn-add-key-time" id="editAddKeyTimeBtn">+ Add time</button>
        <button type="button" class="btn-save" id="saveScheduleBtn">Save</button>
        <button type="button" class="btn-cancel" id="editCancelBtn">Cancel</button>
        <button type="button" class="btn-delete-pts" id="deletePtsBtn">Delete PTS</button>
      </div>
    </section>

    <section id="newScheduleScreen" class="screen hidden">
      <div class="new-schedule-form">
        <label for="newScheduleName">Schedule name</label>
        <input type="text" id="newScheduleName" placeholder="e.g. Dash 8-400 25min Turn" />
      </div>
      <div id="newKeyTimeList" class="phase-list"></div>
      <div class="actions actions-row">
        <button type="button" class="btn-add-key-time" id="addKeyTimeBtn">+ Add time</button>
        <button type="button" class="btn-save" id="saveNewScheduleBtn">Save Schedule</button>
        <button type="button" class="btn-cancel" id="cancelNewScheduleBtn">Cancel</button>
      </div>
    </section>
  </main>

  <div id="adminPasswordModal" class="password-modal hidden">
    <div class="password-modal-box">
      <label for="adminPasswordInput">Enter password to enter admin mode:</label>
      <input type="password" id="adminPasswordInput" />
      <div class="password-modal-actions">
        <button type="button" id="adminPasswordCancelBtn">Cancel</button>
        <button type="button" id="adminPasswordOkBtn">OK</button>
      </div>
    </div>
  </div>

  <!-- Hidden focus sink to prevent auto-tab to next input on mobile -->
  <div id="focusSink" tabindex="-1" style="position: fixed; top: -100px; left: -100px; width: 1px; height: 1px; opacity: 0;"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
