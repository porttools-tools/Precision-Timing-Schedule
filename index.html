<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Turnaround Calculator</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="apple-touch-icon" sizes="57x57" href="icons/apple-icon-57x57.png">
  <link rel="apple-touch-icon" sizes="60x60" href="icons/apple-icon-60x60.png">
  <link rel="apple-touch-icon" sizes="72x72" href="icons/apple-icon-72x72.png">
  <link rel="apple-touch-icon" sizes="76x76" href="icons/apple-icon-76x76.png">
  <link rel="apple-touch-icon" sizes="114x114" href="icons/apple-icon-114x114.png">
  <link rel="apple-touch-icon" sizes="120x120" href="icons/apple-icon-120x120.png">
  <link rel="apple-touch-icon" sizes="144x144" href="icons/apple-icon-144x144.png">
  <link rel="apple-touch-icon" sizes="152x152" href="icons/apple-icon-152x152.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-icon-180x180.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/android-icon-192x192.png">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="96x96" href="icons/favicon-96x96.png">
  <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16x16.png">
  <link rel="manifest" href="manifest.json">
  <meta name="msapplication-TileColor" content="#ffffff">
  <meta name="msapplication-TileImage" content="icons/ms-icon-144x144.png">
  <meta name="theme-color" content="#ffffff">
</head>
<body>
  <header class="app-bar">
    <h1 class="app-bar-title">Precision Timing Schedule</h1>
    <span class="app-bar-pill" id="scheduleName">Dash 8-400 25min Turn</span>
  </header>

  <main>
    <section id="mainScreen" class="screen">
      <p class="hint">Enter any time (HHMM or HH:MM), then press Enter to calculate.</p>
      <div id="phaseList" class="phase-list"></div>
      <div class="actions">
        <button type="button" class="btn-edit" id="editScheduleBtn">Edit schedule</button>
      </div>
    </section>

    <section id="editScreen" class="screen hidden">
      <p class="hint">Offsets are minutes before off blocks (0). Use negative values.</p>
      <div id="editList" class="phase-list"></div>
      <div class="actions">
        <button type="button" class="btn-save" id="saveScheduleBtn">Save</button>
      </div>
    </section>
  </main>

  <div id="passwordModal" class="password-modal hidden">
    <div class="password-modal-box">
      <label for="passwordInput">Enter password to edit schedule:</label>
      <input type="password" id="passwordInput" />
      <div class="password-modal-actions">
        <button type="button" id="passwordCancelBtn">Cancel</button>
        <button type="button" id="passwordOkBtn">OK</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
